<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Required</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather+Sans:wght@300..800&family=Noto+Emoji&display=swap" rel="stylesheet">
  <style>
    body{background:#edeed8;font-family:"Merriweather Sans",sans-serif;font-weight:800;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;color:#333}
    h1{font-size:1.5em;margin:0 0 20px}
    .turnstile{margin:20px 0}
    .logo{width:250px;margin-bottom:5px}
    .widget{width:300px;height:65px;background:#fafafa;border:1px solid #e0e0e0;border-radius:4px;display:flex;align-items:center;padding:0 12px;box-sizing:border-box;margin:0 auto}
    .cb{width:24px;height:24px;border:2px solid #e0e0e0;border-radius:3px;margin-right:12px;flex-shrink:0}
    .widget span{color:#333;font-size:14px;font-weight:400;flex:1;text-align:left}
    .cat{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
    .cat span{font-size:8px;color:#999;margin-top:2px;font-weight:400}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spin2{0%{stroke-dasharray:1,800;stroke-dashoffset:0}50%{stroke-dasharray:400,400;stroke-dashoffset:-200px}100%{stroke-dasharray:800,1;stroke-dashoffset:-800px}}
    .spin2{transform-origin:center;animation:spin2 1.5s ease-in-out infinite,spin 2s linear infinite;animation-direction:alternate}
    footer{position:absolute;bottom:20px;width:100%;text-align:center;font-size:.9em}
    .info{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:10px}
    .blur{filter:blur(5px);transition:filter .3s}
    .blur:hover{filter:none}
    .copy{background:none;border:1px solid #aaa;border-radius:3px;cursor:pointer;padding:2px 6px;font-size:12px;color:#555;font-family:"Noto Emoji",sans-serif}
    .copy:hover{background:#ddd}
    .info-row{display:flex;align-items:center;gap:10px}
    @media(max-width:767px){.info{flex-direction:column;gap:4px}}
    @media(min-width:768px){h1{font-size:2em}.logo{width:350px}}
    @media(min-width:1024px){h1{font-size:2.5em}.logo{width:450px}}
  </style>
</head>
